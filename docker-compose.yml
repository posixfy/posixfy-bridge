services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: posixfy-bridge
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
      - LISTEN_ADDR=0.0.0.0:3000
      - MOUNT_POINTS=${MOUNT_POINTS}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - /path/to/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
